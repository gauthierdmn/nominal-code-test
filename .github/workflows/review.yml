name: nominal-code-review
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/gauthierdmn/nominal-code:032927a49baf6e6fa1ff3f54355d9bcd338e7fc7
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        AGENT_MODEL: claude-3-haiku-20240307
        AGENT_MAX_TURNS: "2"
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cd /app && uv run nominal-code ci github
