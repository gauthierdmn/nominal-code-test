name: nominal-code-review
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/gauthierdmn/nominal-code-openai:dd30caa44a31aceb79ada8af12ebb40f1256a244
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        AGENT_PROVIDER: openai
        AGENT_MODEL: gpt-4.1-nano
        AGENT_MAX_TURNS: "2"
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cd /app && uv run nominal-code ci github
