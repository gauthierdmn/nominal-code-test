name: nominal-code-review
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/gauthierdmn/nominal-code-openai:d2b2ec05a7a7f90ce7b0e1b96e881fdc78c56d5e
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        AGENT_PROVIDER: openai
        AGENT_MODEL: gpt-4.1-nano
        AGENT_MAX_TURNS: "2"
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cd /app && uv run nominal-code ci github
